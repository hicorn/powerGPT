# configs/gpt2_124m.yaml
model:
  n_layer: 12
  n_head: 12
  n_embd: 768
  block_size: 1024
  dropout: 0.0
  bias: false
  flash_attention: true
  use_rope: true

training:
  data_dir: data
  micro_batch_size: 8
  gradient_accumulation_steps: 8
  learning_rate: 0.0006
  max_iters: 20000
  warmup_iters: 500
  lr_decay_iters: 20000
  min_lr: 0.00006
  weight_decay: 0.1
  dtype: fp16
  eval_interval: 500
  save_interval: 2000
  log_interval: 10
  output_dir: checkpoints